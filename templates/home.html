<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .header-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }
        .form-label {
            font-weight: 600;
            color: #444;
        }
        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .result-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            background: #e9ecef;
            border-left: 5px solid #764ba2;
        }
        .form-control:focus, .form-select:focus {
            border-color: #764ba2;
            box-shadow: 0 0 0 0.2rem rgba(118, 75, 162, 0.25);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card main-card">
                <div class="header-section">
                    <h1>Student Exam Performance</h1>
                    <p>Enter details below to predict the Math Score</p>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form action="{{ url_for('predict_datapoint')}}" method="post">
                        
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Gender</label>
                                <select class="form-select" name="gender" required>
                                    <option selected disabled value="">Select Gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Race or Ethnicity</label>
                                <select class="form-select" name="ethnicity" required>
                                    <option selected disabled value="">Select Group</option>
                                    <option value="group A">Group A</option>
                                    <option value="group B">Group B</option>
                                    <option value="group C">Group C</option>
                                    <option value="group D">Group D</option>
                                    <option value="group E">Group E</option>
                                </select>
                            </div>

                            <div class="col-md-12 mb-3">
                                <label class="form-label">Parental Level of Education</label>
                                <select class="form-select" name="parental_level_of_education" required>
                                    <option selected disabled value="">Select Education Level</option>
                                    <option value="associate's degree">Associate's Degree</option>
                                    <option value="bachelor's degree">Bachelor's Degree</option>
                                    <option value="high school">High School</option>
                                    <option value="master's degree">Master's Degree</option>
                                    <option value="some college">Some College</option>
                                    <option value="some high school">Some High School</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Lunch Type</label>
                                <select class="form-select" name="lunch" required>
                                    <option selected disabled value="">Select Lunch Type</option>
                                    <option value="standard">Standard</option>
                                    <option value="free/reduced">Free/Reduced</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Test Preparation Course</label>
                                <select class="form-select" name="test_preparation_course" required>
                                    <option selected disabled value="">Course Status</option>
                                    <option value="none">None</option>
                                    <option value="completed">Completed</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Reading Score (0-100)</label>
                                <input class="form-control" type="number" name="reading_score" placeholder="Enter score" min="0" max="100" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Writing Score (0-100)</label>
                                <input class="form-control" type="number" name="writing_score" placeholder="Enter score" min="0" max="100" required>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-predict w-100">Predict Performance</button>
                        </div>
                    </form>

                    {% if results %}
                    <div class="result-section text-center">
                        <h3 class="mb-0">Predicted Math Score: <span class="text-primary">{{results}}</span></h3>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
